<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄豆人生态箱 MVP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        h1 { margin-bottom: 10px; font-size: 24px; }
        #gameContainer {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        canvas {
            border: 2px solid #444;
            border-radius: 8px;
            cursor: crosshair;
            background: #2d5016;
        }
        #panel {
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .stat-box {
            background: #16213e;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }
        .stat-box h3 {
            font-size: 14px;
            margin-bottom: 6px;
            color: #ffd700;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
        }
        button {
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
            color: white;
        }
        button:hover { transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        .btn-rain { background: #3498db; }
        .btn-drought { background: #e67e22; }
        .btn-plague { background: #9b59b6; }
        .btn-meteor { background: #e74c3c; }
        .btn-pause { background: #2ecc71; }
        .btn-active { box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        #log {
            height: 150px;
            overflow-y: auto;
            background: #0f0f23;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            line-height: 1.5;
        }
        .log-entry { margin: 2px 0; }
        .log-year { color: #ffd700; font-weight: bold; }
        .log-event { color: #ff6b6b; }
        .log-info { color: #74b9ff; }
        #tooltip {
            position: fixed;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <h1>🌱 黄豆人生态箱 MVP</h1>
    <div id="gameContainer">
        <canvas id="game" width="800" height="600"></canvas>
        <div id="panel">
            <div class="stat-box">
                <h3>📊 世界统计</h3>
                <div class="stat-row"><span>年份:</span><span id="year">1</span></div>
                <div class="stat-row"><span>黄豆人:</span><span id="population">0</span></div>
                <div class="stat-row"><span>房屋:</span><span id="houses">0</span></div>
                <div class="stat-row"><span>食物:</span><span id="food">0</span></div>
                <div class="stat-row"><span>木材:</span><span id="wood">0</span></div>
                <div class="stat-row"><span>天气:</span><span id="weather">☀️ 晴朗</span></div>
            </div>
            <button class="btn-pause" id="btnPause" onclick="togglePause()">⏸️ 暂停</button>
            <button class="btn-rain" id="btnRain" onclick="setTool('rain')">🌧️ 下雨</button>
            <button class="btn-drought" id="btnDrought" onclick="setTool('drought')">☀️ 干旱</button>
            <button class="btn-plague" id="btnPlague" onclick="setTool('plague')">☠️ 瘟疫</button>
            <button class="btn-meteor" id="btnMeteor" onclick="setTool('meteor')">☄️ 陨石</button>
            <div class="stat-box">
                <h3>📜 历史记录</h3>
                <div id="log"></div>
            </div>
        </div>
    </div>
    <div id="tooltip"></div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        
        // 游戏配置
        const CFG = {
            TILE: 20,
            MAP_W: 40,
            MAP_H: 30,
            BLOB_RADIUS: 6,
            BLOB_SPEED: 0.8,
            MAX_AGE: 600,
            REPRODUCE_AGE: 150,
            HUNGER_MAX: 200,
            FOOD_VAL: 60,
            WOOD_VAL: 1,
            HOUSE_COST: 5,
            FOOD_GROWTH: 0.02,
            START_BLOBS: 8,
            START_TREES: 40,
            START_BUSHES: 60
        };
        
        // 状态
        let paused = false;
        let currentTool = null;
        let year = 1;
        let yearTimer = 0;
        let weather = 'sunny'; // sunny, rain, drought
        let weatherTimer = 0;
        let disasterEffects = [];
        let particles = [];
        let logEntries = [];
        
        // 地图
        const tiles = [];
        const resources = [];
        const houses = [];
        let blobs = [];
        
        function initMap() {
            for (let y = 0; y < CFG.MAP_H; y++) {
                tiles[y] = [];
                for (let x = 0; x < CFG.MAP_W; x++) {
                    tiles[y][x] = { type: 'grass', water: Math.random() < 0.05 ? 1 : 0 };
                }
            }
            // 资源
            for (let i = 0; i < CFG.START_TREES; i++) {
                resources.push({
                    x: Math.random() * CFG.MAP_W * CFG.TILE,
                    y: Math.random() * CFG.MAP_H * CFG.TILE,
                    type: 'tree',
                    amount: 1 + Math.floor(Math.random() * 3)
                });
            }
            for (let i = 0; i < CFG.START_BUSHES; i++) {
                resources.push({
                    x: Math.random() * CFG.MAP_W * CFG.TILE,
                    y: Math.random() * CFG.MAP_H * CFG.TILE,
                    type: 'bush',
                    amount: 2 + Math.floor(Math.random() * 4),
                    regrow: 0
                });
            }
            // 初始黄豆人
            for (let i = 0; i < CFG.START_BLOBS; i++) {
                spawnBlob();
            }
        }
        
        function spawnBlob(x, y) {
            const bx = x || Math.random() * CFG.MAP_W * CFG.TILE;
            const by = y || Math.random() * CFG.MAP_H * CFG.TILE;
            blobs.push({
                x: bx, y: by,
                vx: 0, vy: 0,
                age: 0,
                hunger: CFG.HUNGER_MAX * 0.7,
                health: 100,
                state: 'wander',
                target: null,
                wood: 0,
                hasHouse: false,
                houseX: 0, houseY: 0,
                infected: 0,
                color: `hsl(${40 + Math.random() * 20}, ${70 + Math.random() * 30}%, ${45 + Math.random() * 15}%)`
            });
        }
        
        function addLog(text, type = 'info') {
            const entry = { year: Math.floor(year), text, type };
            logEntries.unshift(entry);
            if (logEntries.length > 50) logEntries.pop();
            updateLog();
        }
        
        function updateLog() {
            const el = document.getElementById('log');
            el.innerHTML = logEntries.map(e => {
                const cls = e.type === 'event' ? 'log-event' : e.type === 'year' ? 'log-year' : 'log-info';
                return `<div class="log-entry"><span class="log-year">第${e.year}年</span> <span class="${cls}">${e.text}</span></div>`;
            }).join('');
        }
        
        function updateStats() {
            document.getElementById('year').textContent = Math.floor(year);
            document.getElementById('population').textContent = blobs.length;
            document.getElementById('houses').textContent = houses.length;
            const food = resources.filter(r => r.type === 'bush').reduce((a, r) => a + r.amount, 0);
            const wood = resources.filter(r => r.type === 'tree').reduce((a, r) => a + r.amount, 0);
            document.getElementById('food').textContent = food;
            document.getElementById('wood').textContent = wood;
            
            let wtext = '☀️ 晴朗';
            if (weather === 'rain') wtext = '🌧️ 下雨';
            else if (weather === 'drought') wtext = '☀️ 干旱';
            document.getElementById('weather').textContent = wtext;
        }
        
        function setTool(tool) {
            currentTool = currentTool === tool ? null : tool;
            document.querySelectorAll('button').forEach(b => b.classList.remove('btn-active'));
            if (currentTool) {
                document.getElementById('btn' + tool.charAt(0).toUpperCase() + tool.slice(1)).classList.add('btn-active');
            }
            canvas.style.cursor = currentTool ? 'crosshair' : 'default';
        }
        
        function togglePause() {
            paused = !paused;
            document.getElementById('btnPause').textContent = paused ? '▶️ 继续' : '⏸️ 暂停';
        }
        
        canvas.addEventListener('click', e => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (!currentTool) return;
            
            if (currentTool === 'rain') {
                weather = 'rain';
                weatherTimer = 600;
                addLog('天降大雨，万物复苏', 'info');
                for (let i = 0; i < 50; i++) {
                    particles.push({ x: Math.random() * canvas.width, y: -10, vx: -1 + Math.random() * 2, vy: 3 + Math.random() * 3, life: 100, color: '#74b9ff', type: 'rain' });
                }
            } else if (currentTool === 'drought') {
                weather = 'drought';
                weatherTimer = 600;
                addLog('干旱降临，作物枯萎', 'event');
            } else if (currentTool === 'plague') {
                let count = 0;
                blobs.forEach(b => {
                    const d = Math.hypot(b.x - x, b.y - y);
                    if (d < 100) {
                        b.infected = 300;
                        count++;
                    }
                });
                if (count > 0) addLog(`瘟疫爆发，${count}人被感染`, 'event');
                for (let i = 0; i < 30; i++) {
                    particles.push({ x: x + (Math.random() - 0.5) * 100, y: y + (Math.random() - 0.5) * 100, vx: (Math.random() - 0.5) * 2, vy: -1 - Math.random() * 2, life: 60, color: '#9b59b6', type: 'smoke' });
                }
            } else if (currentTool === 'meteor') {
                addLog('陨石天降！', 'event');
                disasterEffects.push({ x, y, radius: 0, maxRadius: 120, damage: 100, type: 'meteor', timer: 60 });
                for (let i = 0; i < 40; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 6;
                    particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 40 + Math.random() * 30, color: '#e74c3c', type: 'fire', size: 3 + Math.random() * 5 });
                }
            }
            currentTool = null;
            document.querySelectorAll('button').forEach(b => b.classList.remove('btn-active'));
        });
        
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            let found = null;
            for (let b of blobs) {
                if (Math.hypot(b.x - x, b.y - y) < CFG.BLOB_RADIUS + 2) {
                    found = b;
                    break;
                }
            }
            if (found) {
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 10) + 'px';
                tooltip.style.top = (e.clientY + 10) + 'px';
                tooltip.innerHTML = `年龄: ${Math.floor(found.age / 10)}岁<br>饥饿: ${Math.floor(found.hunger)}<br>生命: ${Math.floor(found.health)}<br>状态: ${getStateText(found.state)}${found.infected > 0 ? '<br><span style="color:#9b59b6">☠️ 感染中</span>' : ''}`;
            } else {
                tooltip.style.display = 'none';
            }
        });
        
        function getStateText(s) {
            const map = { wander: '游荡', findFood: '觅食', gather: '采集', build: '建造', rest: '休息', reproduce: '繁衍' };
            return map[s] || s;
        }
        
        function update() {
            if (paused) return;
            
            yearTimer++;
            if (yearTimer >= 360) {
                yearTimer = 0;
                year++;
                if (year % 10 === 0) addLog(`文明已延续至第${Math.floor(year)}年`, 'year');
            }
            
            // 天气计时
            if (weatherTimer > 0) {
                weatherTimer--;
                if (weatherTimer <= 0) weather = 'sunny';
            }
            
            // 资源再生
            resources.forEach(r => {
                if (r.type === 'bush') {
                    if (weather === 'rain') {
                        r.regrow += CFG.FOOD_GROWTH * 2;
                    } else if (weather === 'drought') {
                        r.regrow += CFG.FOOD_GROWTH * 0.1;
                    } else {
                        r.regrow += CFG.FOOD_GROWTH;
                    }
                    if (r.regrow >= 1 && r.amount < 5) {
                        r.amount++;
                        r.regrow = 0;
                    }
                }
            });
            
            // 随机再生一些草丛
            if (Math.random() < 0.02 && weather !== 'drought') {
                resources.push({
                    x: Math.random() * CFG.MAP_W * CFG.TILE,
                    y: Math.random() * CFG.MAP_H * CFG.TILE,
                    type: 'bush',
                    amount: 1,
                    regrow: 0
                });
            }
            
            // 更新黄豆人
            const prevCount = blobs.length;
            blobs.forEach((b, idx) => {
                b.age++;
                b.hunger -= 0.3;
                if (b.infected > 0) {
                    b.infected--;
                    b.health -= 0.2;
                    if (Math.random() < 0.05) {
                        particles.push({ x: b.x, y: b.y, vx: (Math.random() - 0.5), vy: -0.5 - Math.random(), life: 20, color: '#9b59b6', type: 'smoke', size: 2 });
                    }
                }
                
                // 死亡判断
                if (b.hunger <= 0 || b.health <= 0 || b.age > CFG.MAX_AGE) {
                    b.dead = true;
                    return;
                }
                
                // AI 状态机
                blobAI(b);
                
                // 移动
                b.x += b.vx;
                b.y += b.vy;
                b.x = Math.max(CFG.BLOB_RADIUS, Math.min(CFG.MAP_W * CFG.TILE - CFG.BLOB_RADIUS, b.x));
                b.y = Math.max(CFG.BLOB_RADIUS, Math.min(CFG.MAP_H * CFG.TILE - CFG.BLOB_RADIUS, b.y));
                
                // 繁衍
                if (b.age > CFG.REPRODUCE_AGE && b.hunger > CFG.HUNGER_MAX * 0.6 && b.state !== 'reproduce' && Math.random() < 0.002) {
                    b.state = 'reproduce';
                }
            });
            
            // 清理死亡
            const died = blobs.filter(b => b.dead);
            blobs = blobs.filter(b => !b.dead);
            if (died.length > 0 && Math.random() < 0.3) {
                addLog(`${died.length}个黄豆人去世了`, 'event');
            }
            
            // 灭亡与复兴
            if (blobs.length === 0 && prevCount > 0) {
                addLog('文明灭亡了...', 'event');
                setTimeout(() => {
                    addLog('新的黄豆人降临了！', 'info');
                    for (let i = 0; i < 4; i++) spawnBlob();
                }, 2000);
            }
            
            // 更新灾害
            disasterEffects.forEach(d => {
                d.timer--;
                if (d.type === 'meteor') {
                    d.radius += (d.maxRadius - d.radius) * 0.1;
                    blobs.forEach(b => {
                        const dist = Math.hypot(b.x - d.x, b.y - d.y);
                        if (dist < d.radius && !b.hitByMeteor) {
                            b.health -= d.damage * 0.1;
                            b.hitByMeteor = true;
                        }
                    });
                    if (d.timer <= 0) {
                        blobs.forEach(b => delete b.hitByMeteor);
                    }
                }
            });
            disasterEffects = disasterEffects.filter(d => d.timer > 0);
            
            // 更新粒子
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.type === 'rain') p.vy += 0.1;
            });
            particles = particles.filter(p => p.life > 0 && p.y < canvas.height);
            
            // 持续降雨粒子
            if (weather === 'rain' && Math.random() < 0.3) {
                for (let i = 0; i < 3; i++) {
                    particles.push({ x: Math.random() * canvas.width, y: -10, vx: -1 + Math.random() * 2, vy: 3 + Math.random() * 3, life: 100, color: '#74b9ff', type: 'rain' });
                }
            }
            
            updateStats();
        }
        
        function blobAI(b) {
            // 饥饿时优先找食物
            if (b.hunger < CFG.HUNGER_MAX * 0.4 && b.state !== 'findFood') {
                b.state = 'findFood';
                b.target = null;
            }
            
            // 状态处理
            if (b.state === 'wander') {
                if (Math.random() < 0.02) {
                    const angle = Math.random() * Math.PI * 2;
                    b.vx = Math.cos(angle) * CFG.BLOB_SPEED;
                    b.vy = Math.sin(angle) * CFG.BLOB_SPEED;
                }
                // 概率建造
                if (!b.hasHouse && b.wood >= CFG.HOUSE_COST && Math.random() < 0.005) {
                    b.state = 'build';
                }
            } else if (b.state === 'findFood') {
                if (!b.target || b.target.amount <= 0) {
                    // 找最近的食物
                    let best = null, bestDist = Infinity;
                    resources.forEach(r => {
                        if (r.type === 'bush' && r.amount > 0) {
                            const d = Math.hypot(r.x - b.x, r.y - b.y);
                            if (d < bestDist) { bestDist = d; best = r; }
                        }
                    });
                    b.target = best;
                    if (!best) { b.state = 'wander'; return; }
                }
                const dx = b.target.x - b.x;
                const dy = b.target.y - b.y;
                const dist = Math.hypot(dx, dy);
                if (dist < 5) {
                    // 吃到食物
                    const eat = Math.min(b.target.amount, 2);
                    b.target.amount -= eat;
                    b.hunger = Math.min(CFG.HUNGER_MAX, b.hunger + eat * CFG.FOOD_VAL);
                    b.state = 'wander';
                    b.target = null;
                } else {
                    b.vx = (dx / dist) * CFG.BLOB_SPEED;
                    b.vy = (dy / dist) * CFG.BLOB_SPEED;
                }
            } else if (b.state === 'build') {
                if (!b.hasHouse) {
                    b.houseX = b.x + (Math.random() - 0.5) * 40;
                    b.houseY = b.y + (Math.random() - 0.5) * 40;
                    b.houseX = Math.max(10, Math.min(CFG.MAP_W * CFG.TILE - 10, b.houseX));
                    b.houseY = Math.max(10, Math.min(CFG.MAP_H * CFG.TILE - 10, b.houseY));
                    houses.push({ x: b.houseX, y: b.houseY, owner: b });
                    b.hasHouse = true;
                    b.wood -= CFG.HOUSE_COST;
                }
                b.state = 'rest';
            } else if (b.state === 'rest') {
                const dx = b.houseX - b.x;
                const dy = b.houseY - b.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 5) {
                    b.vx = (dx / dist) * CFG.BLOB_SPEED;
                    b.vy = (dy / dist) * CFG.BLOB_SPEED;
                } else {
                    b.vx *= 0.5;
                    b.vy *= 0.5;
                    b.hunger -= 0.15;
                    b.health = Math.min(100, b.health + 0.1);
                    if (b.hunger > CFG.HUNGER_MAX * 0.8) {
                        b.state = 'wander';
                    }
                }
            } else if (b.state === 'reproduce') {
                // 简化：直接分裂
                if (b.hunger > CFG.HUNGER_MAX * 0.5 && Math.random() < 0.01) {
                    b.hunger -= CFG.HUNGER_MAX * 0.3;
                    spawnBlob(b.x + (Math.random() - 0.5) * 20, b.y + (Math.random() - 0.5) * 20);
                    addLog('新生命诞生了！', 'info');
                }
                b.state = 'wander';
            }
            
            // 采集木材（简化：经过树时概率采集）
            if (b.state === 'wander' || b.state === 'findFood') {
                resources.forEach(r => {
                    if (r.type === 'tree' && r.amount > 0) {
                        const d = Math.hypot(r.x - b.x, r.y - b.y);
                        if (d < 8 && Math.random() < 0.02) {
                            r.amount--;
                            b.wood++;
                        }
                    }
                });
            }
        }
        
        function draw() {
            // 背景
            ctx.fillStyle = weather === 'drought' ? '#5a4a3a' : '#3d6b22';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 网格
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= CFG.MAP_W; x++) {
                ctx.beginPath();
                ctx.moveTo(x * CFG.TILE, 0);
                ctx.lineTo(x * CFG.TILE, CFG.MAP_H * CFG.TILE);
                ctx.stroke();
            }
            for (let y = 0; y <= CFG.MAP_H; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * CFG.TILE);
                ctx.lineTo(CFG.MAP_W * CFG.TILE, y * CFG.TILE);
                ctx.stroke();
            }
            
            // 资源
            resources.forEach(r => {
                if (r.amount <= 0) return;
                if (r.type === 'tree') {
                    ctx.fillStyle = '#2d3436';
                    ctx.fillRect(r.x - 3, r.y - 2, 6, 4);
                    ctx.fillStyle = '#27ae60';
                    ctx.beginPath();
                    ctx.arc(r.x, r.y - 6, 8, 0, Math.PI * 2);
                    ctx.fill();
                } else if (r.type === 'bush') {
                    const size = 3 + r.amount * 1.5;
                    ctx.fillStyle = weather === 'drought' ? '#b8a030' : '#f1c40f';
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            
            // 房屋
            houses.forEach(h => {
                ctx.fillStyle = '#8e44ad';
                ctx.fillRect(h.x - 8, h.y - 6, 16, 12);
                ctx.fillStyle = '#c0392b';
                ctx.beginPath();
                ctx.moveTo(h.x - 10, h.y - 6);
                ctx.lineTo(h.x, h.y - 14);
                ctx.lineTo(h.x + 10, h.y - 6);
                ctx.fill();
            });
            
            // 黄豆人
            blobs.forEach(b => {
                // 身体
                ctx.fillStyle = b.color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, CFG.BLOB_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                
                // 表情
                ctx.fillStyle = '#2d3436';
                ctx.beginPath();
                ctx.arc(b.x - 2, b.y - 1, 1.5, 0, Math.PI * 2);
                ctx.arc(b.x + 2, b.y - 1, 1.5, 0, Math.PI * 2);
                ctx.fill();
                
                // 嘴巴
                ctx.strokeStyle = '#2d3436';
                ctx.lineWidth = 1;
                ctx.beginPath();
                if (b.hunger < 30) {
                    ctx.arc(b.x, b.y + 2, 2, 0, Math.PI, false);
                } else {
                    ctx.arc(b.x, b.y + 1, 2, 0, Math.PI, false);
                }
                ctx.stroke();
                
                // 感染效果
                if (b.infected > 0) {
                    ctx.strokeStyle = '#9b59b6';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, CFG.BLOB_RADIUS + 2, 0, Math.PI * 2);
                    ctx.stroke();
                }
                
                // 饥饿指示
                if (b.hunger < 50) {
                    ctx.fillStyle = 'rgba(255,0,0,0.5)';
                    ctx.fillRect(b.x - 6, b.y - 12, 12 * (b.hunger / CFG.HUNGER_MAX), 2);
                }
            });
            
            // 灾害效果
            disasterEffects.forEach(d => {
                if (d.type === 'meteor') {
                    const grad = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.radius);
                    grad.addColorStop(0, 'rgba(231, 76, 60, 0.8)');
                    grad.addColorStop(0.5, 'rgba(231, 76, 60, 0.3)');
                    grad.addColorStop(1, 'rgba(231, 76, 60, 0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#2c3e50';
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, 15, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            
            // 粒子
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 60;
                const size = p.size || 2;
                ctx.fillRect(p.x - size/2, p.y - size/2, size, size);
                ctx.globalAlpha = 1;
            });
            
            // 工具预览
            if (currentTool) {
                // 不需要额外绘制，鼠标样式已变
            }
        }
        
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        initMap();
        addLog('世界诞生了！', 'year');
        loop();
    </script>
</body>
</html>
